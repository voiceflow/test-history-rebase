version: 2.1

orbs:
  codecov: codecov/codecov@1.1.1
  vfcommon: voiceflow/common@0.0.16
  slack: circleci/slack@4.0.1

# Reusable YAML chunks
defaults:
  prod_deploy_filters: &prod_deploy_filters
    filters:
      branches:
        ignore: /.*/
      tags:
        only: /^v[0-9]*(\.[0-9]*)*$/

commands:
  auth_npm:
    description: Authenticate with npm
    steps:
      - run:
          name: Authenticate with npm
          command: |
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc

jobs:
  build-app:
    executor: vfcommon/node-executor
    steps:
      - checkout
      - vfcommon/install_node_modules
      - run:
          name: Build app
          command: |
            if [[ -z "$CIRCLE_BRANCH" && ! -z "$CIRCLE_TAG" ]]; then
              echo "Building production image!"
              export VF_APP_API_HOST=api.voiceflow.com
              export VF_APP_BUILD_ENV=production
              export VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.maintenance/maintenance.json
            else
              echo "Building development image!"
              export VF_APP_BUILD_ENV=staging
              export VF_APP_API_HOST=api-$CIRCLE_BRANCH.development.voiceflow.com
              export VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.dev.maintenance/maintenance.json
            fi
            yarn build
      - persist_to_workspace:
          root: ~/voiceflow
          paths:
            - build
            - app.dockerfile
            - config

  build-storybook:
    executor: vfcommon/node-executor
    steps:
      - checkout
      - vfcommon/install_node_modules
      - run:
          name: Build storybook
          command: yarn storybook:build
      - persist_to_workspace:
          root: ~/voiceflow
          paths:
            - storybook_build
            - storybook.dockerfile

  build-admin:
    executor: vfcommon/node-executor
    steps:
      - checkout
      - vfcommon/install_node_modules
      - run:
          name: Build admin static artifacts
          command: |
            if [ "$CIRCLE_BRANCH" == "admin" ]; then
              export VF_APP_API_HOST=api-master.development.voiceflow.com
              export VF_APP_BUILD_ENV=staging
            elif [ "$CIRCLE_BRANCH" == "admin-prod" ]; then
              export VF_APP_API_HOST=api.voiceflow.com
              export VF_APP_BUILD_ENV=production
            fi
            yarn build:admin
      - persist_to_workspace:
          root: ~/voiceflow
          paths:
            - admin_build
            - admin.dockerfile
            - config

  test-integration: # Run integration tests in parallel
    executor: vfcommon/node-executor
    steps: # a collection of executable commands
      - checkout
      - vfcommon/install_node_modules
      - run:
          name: Integration Tests
          command: yarn test:integration --coverage --detectOpenHandles
      - codecov/upload:
          file: jest_coverage/lcov.info
          flags: integration

  test: # Main unit, style, and dependency tests
    executor: vfcommon/node-executor
    steps: # a collection of executable commands
      - checkout
      - vfcommon/install_node_modules
      - run:
          name: Unit Tests
          command: yarn test:unit
      - codecov/upload:
          file: nyc_coverage/lcov.info
          flags: unit
      - vfcommon/lint_source
      - run:
          name: Dependency Tests
          command: yarn test:dependencies # Run dependency test here

  test-e2e:
    resource_class: large
    docker: # run the steps with Docker
      - image: cypress/base:12 # Test steps container
        environment:
          DOCKERIZE_VERSION: v0.6.1
          MKCERT_VERSION: v1.4.0
          NODE_OPTIONS: --max_old_space_size=8192
      - image: postgres:10-alpine # PostgresDB service container
        environment:
          POSTGRES_HOST_AUTH_METHOD: trust
      - image: circleci/dynamodb:13-oracle # DynamoDB service container
      - image: circleci/mongo:4.2-bionic # MongoDB service container
      - image: redis:5-alpine # Redis service container
    steps: # a collection of executable commands
      - checkout
      - auth_npm
      - run:
          name: Setup environment
          command: |
            apt update
            apt install -y nginx postgresql-client wget libnss3-tools apt-transport-https ca-certificates curl gnupg-agent software-properties-common
            curl -fsSL https://download.docker.com/linux/debian/gpg | apt-key add -
            add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/debian $(lsb_release -cs) stable"
            apt update
            apt install docker-ce-cli
            wget https://github.com/FiloSottile/mkcert/releases/download/$MKCERT_VERSION/mkcert-$MKCERT_VERSION-linux-amd64
            chmod +x mkcert-$MKCERT_VERSION-linux-amd64
            mv mkcert-$MKCERT_VERSION-linux-amd64 /usr/local/bin/mkcert
            wget https://github.com/jwilder/dockerize/releases/download/$DOCKERIZE_VERSION/dockerize-linux-amd64-$DOCKERIZE_VERSION.tar.gz
            tar -C /usr/local/bin -xzvf dockerize-linux-amd64-$DOCKERIZE_VERSION.tar.gz
            rm dockerize-linux-amd64-$DOCKERIZE_VERSION.tar.gz
            curl -L "https://github.com/docker/compose/releases/download/1.24.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            chmod +x /usr/local/bin/docker-compose
      - run:
          name: Clone Database
          command: git clone https://$GITHUB_USERNAME:$GITHUB_READ_TOKEN@github.com/voiceflow/database-cli ~/database-cli
      - run:
          name: Clone Creator API
          command: git clone https://$GITHUB_USERNAME:$GITHUB_READ_TOKEN@github.com/voiceflow/creator-api ~/creator-api
      - run:
          name: Setup Database
          working_directory: ~/database-cli
          command: |
            yarn install --frozen-lockfile --ignore-engines
            yarn init:e2e
      - run:
          name: Setup Creator API
          working_directory: ~/creator-api
          command: |
            yarn install --frozen-lockfile
            yarn gen-certs:e2e
      - run:
          name: Setup Creator App
          no_output_timeout: 15m
          command: |
            echo 'VF_APP_API_HOST=localhost' > .env.local
            yarn install --frozen-lockfile
            yarn build:e2e
            yarn gen-certs:e2e
            cp -R build/. /var/www
            cp -R certs/. /etc/nginx/ssl
            cp config/nginx.e2e.conf /etc/nginx/conf.d/default.conf
            nginx
      - run:
          name: Wait for Postgres & Dynamo Docker Images
          command: dockerize -wait tcp://localhost:5432 -timeout 1m && dockerize -wait tcp://localhost:8000 -timeout 1m
      - run:
          name: Start Creator API
          background: true
          working_directory: ~/creator-api
          command: yarn e2e
      - run:
          name: Wait for Creator API
          command: dockerize -wait tcp://localhost:8080 -timeout 1m
      - run:
          name: Run Cypress Tests
          command: yarn cypress:ci
      # - codecov/upload:
      #     file: nyc_coverage/lcov.info
      #     flags: e2e
      - store_artifacts:
          path: cypress/videos
      - store_artifacts:
          path: cypress/screenshots

  build-deploy-app-image:
    parameters:
      tagged:
        description: Running on a git tag?
        type: boolean
        default: false
      google:
        description: Deploy to google actions environment?
        type: boolean
        default: false
    executor: vfcommon/build-executor
    environment:
      IMAGE_REPO: "168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app"
    steps:
      - attach_workspace:
          at: /tmp/vf-build
      - setup_remote_docker
      - run:
          name: "Build docker image"
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            docker build \
              -f app.dockerfile \
              -t $IMAGE_NAME .
      - run:
          name: "Push docker images"
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker push $IMAGE_NAME
            BRANCH_NAME=$CIRCLE_BRANCH
            if [[ -z "$CIRCLE_BRANCH" && ! -z "$CIRCLE_TAG" ]]; then
              BRANCH_NAME="master"
            fi
            docker tag $IMAGE_NAME $IMAGE_REPO:latest-$BRANCH_NAME
            docker push $IMAGE_REPO:latest-$BRANCH_NAME
      - vfcommon/deploy_image:
          image_repo: "168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app"
          namespace: "voiceflow-v1"
          target: "statefulset/creator-app"
          tagged: << parameters.tagged >>
      # TODO: Remove after retirement of google-actions environment
      - when:
          condition: << parameters.google >>
          steps:
            - run:
                name: Deploy to actions subdomain kubernetes
                command: |
                  IMAGE_TAG="k8s-$CIRCLE_SHA1"
                  IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
                  aws eks --region us-east-1 update-kubeconfig --name production
                  kubectl set image --namespace voiceflow-v1 statefulset/creator-app-google app=$IMAGE_NAME
      - run:
          name: Wait for deployment rollout
          command: |
            sleep 120
      - slack/notify:
          channel: product_releases
          event: pass
          template: success_tagged_deploy_1
      - slack/notify:
          channel: product_releases
          event: fail
          mentions: "@engteam"
          template: basic_fail_1

  build-deploy-storybook-dev-environment:
    executor: vfcommon/build-executor
    environment:
      IMAGE_REPO: "168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook"
    steps:
      - add_ssh_keys: # To enable write access to repository for removing dev environment branches
          fingerprints:
            - "93:f8:51:53:5e:bd:75:0e:29:24:4d:6a:3f:ef:e1:4a"
      - attach_workspace:
          at: /tmp/vf-build
      - setup_remote_docker
      - run:
          name: "Build storybook docker image"
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            docker build \
              -f storybook.dockerfile \
              -t $IMAGE_NAME .
      - run:
          name: "Push storybook docker images"
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker push $IMAGE_NAME
      - run:
          name: Install latest envcli utility
          command: |
            API_URL="https://$GITHUB_TOKEN:@api.github.com/repos/voiceflow/envcli"
            ASSET_ID=$(curl $API_URL/releases/latest | jq -r '.assets[2].id')
            curl -J -L -H "Accept: application/octet-stream" "$API_URL/releases/assets/$ASSET_ID" --output envcli.tar.gz
            tar -xf envcli.tar.gz
      - run:
          name: "Deploy dev environment image"
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            ENV_NAME="${CIRCLE_BRANCH%%_*}"
            aws eks --region us-east-1 update-kubeconfig --name development
            NON_INTERACTIVE=true ./envcli edit component storybook storybook -n $ENV_NAME -i $IMAGE_NAME

  build-deploy-storybook-image:
    executor: vfcommon/build-executor
    environment:
      IMAGE_REPO: "168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook"
    steps:
      - attach_workspace:
          at: /tmp/vf-build
      - setup_remote_docker
      - run:
          name: "Build storybook docker image"
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            docker build \
              -f storybook.dockerfile \
              -t $IMAGE_NAME .
      - run:
          name: "Push storybook docker images"
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker push $IMAGE_NAME
            docker tag $IMAGE_NAME $IMAGE_REPO:latest-$CIRCLE_BRANCH
            docker push $IMAGE_REPO:latest-$CIRCLE_BRANCH
      - run:
          name: Update image
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            if [ "$CIRCLE_BRANCH" == "master" ] || [ "$CIRCLE_BRANCH" == "staging" ]; then
              aws eks --region us-east-1 update-kubeconfig --name development
            fi
            kubectl set image --namespace voiceflow-v1 deployment/storybook-$CIRCLE_BRANCH storybook=168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:k8s-$CIRCLE_SHA1

  build-deploy-admin-image:
    executor: vfcommon/build-executor
    environment:
      IMAGE_REPO: "168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin"
    steps:
      - attach_workspace:
          at: /tmp/vf-build
      - setup_remote_docker
      - run:
          name: "Build admin docker image"
          command: |
            if [ "$CIRCLE_BRANCH" == "admin" ]; then
              export DEPLOY_SUFFIX=development
            elif [ "$CIRCLE_BRANCH" == "admin-prod" ]; then
              export DEPLOY_SUFFIX=production
            fi
            echo $DEPLOY_SUFFIX > /tmp/deploy_suffix
            docker build \
              -f admin.dockerfile \
              -t $IMAGE_REPO:k8s-$DEPLOY_SUFFIX-$CIRCLE_SHA1 .
      - run:
          name: "Push admin docker images"
          command: |
            DEPLOY_SUFFIX=$(cat /tmp/deploy_suffix)
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker push $IMAGE_REPO:k8s-$DEPLOY_SUFFIX-$CIRCLE_SHA1
            docker tag $IMAGE_REPO:k8s-$DEPLOY_SUFFIX-$CIRCLE_SHA1 $IMAGE_REPO:latest-$DEPLOY_SUFFIX
            docker push $IMAGE_REPO:latest-$DEPLOY_SUFFIX
      - run:
          name: "Deploy admin docker image"
          command: |
            DEPLOY_SUFFIX=$(cat /tmp/deploy_suffix)
            if [ "$CIRCLE_BRANCH" == "admin" ]; then
              aws eks --region us-east-1 update-kubeconfig --name development
            elif [ "$CIRCLE_BRANCH" == "admin-prod" ]; then
              aws eks --region us-east-1 update-kubeconfig --name production
            fi
            kubectl set image --namespace voiceflow-v1 deployment/admin-ui-$DEPLOY_SUFFIX app=$IMAGE_REPO:k8s-$DEPLOY_SUFFIX-$CIRCLE_SHA1

  build-app-dev-environment:
    executor: vfcommon/node-executor
    environment:
      IMAGE_REPO: "168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app"
    steps:
      - checkout
      - run:
          name: If container with this git SHA already exists, don't build
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            curl "https://s3.amazonaws.com/aws-cli/awscli-bundle.zip" -o "awscli-bundle.zip"
            unzip awscli-bundle.zip
            sudo ./awscli-bundle/install -i /usr/local/aws -b /usr/local/bin/aws
            $(aws ecr get-login --no-include-email --region us-east-1)
            set +e
            DOCKER_CLI_EXPERIMENTAL=enabled docker manifest inspect $IMAGE_NAME > /dev/null 2>&1
            SEARCH_IMAGE_RESULT=$?
            set -e
            if [[ $SEARCH_IMAGE_RESULT -eq 0 ]]; then  
              circleci-agent step halt  # Image exists, skip following steps
            fi
      - vfcommon/install_node_modules
      - run:
          name: Build app, if docker container does not exist
          command: |
            ENV_NAME="${CIRCLE_BRANCH%%_*}"
            export VF_APP_BUILD_ENV=staging
            export VF_APP_API_HOST=api-$ENV_NAME.development.voiceflow.com
            export VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.dev.maintenance/maintenance.json
            yarn build
      - persist_to_workspace:
          root: ~/voiceflow
          paths:
            - build
            - app.dockerfile
            - config

  deploy-app-dev-environment:
    executor: vfcommon/build-executor
    environment:
      IMAGE_REPO: "168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app"
    steps:
      - checkout # special step to check out source code to working directory
      - add_ssh_keys: # To enable write access to repository for removing dev environment branches
          fingerprints:
            - "93:f8:51:53:5e:bd:75:0e:29:24:4d:6a:3f:ef:e1:4a"
      - attach_workspace:
          at: /tmp/vf-build
      - setup_remote_docker
      - run:
          name: "Build and push dev environment image"
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            $(aws ecr get-login --no-include-email --region us-east-1)
            set +e
            DOCKER_CLI_EXPERIMENTAL=enabled docker manifest inspect $IMAGE_NAME > /dev/null 2>&1
            SEARCH_IMAGE_RESULT=$?
            set -e
            if [[ $SEARCH_IMAGE_RESULT -ne 0 ]]; then   # Only build the image if there are no existing images 
              docker build \
                -f app.dockerfile \
                -t $IMAGE_NAME .
              $(aws ecr get-login --no-include-email --region us-east-1)
              docker push $IMAGE_NAME
            fi
            git push origin --delete $CIRCLE_BRANCH --no-verify # Clean up branch
      - run:
          name: Install latest envcli utility
          command: |
            API_URL="https://$GITHUB_TOKEN:@api.github.com/repos/voiceflow/envcli"
            ASSET_ID=$(curl $API_URL/releases/latest | jq -r '.assets[2].id')
            curl -J -L -H "Accept: application/octet-stream" "$API_URL/releases/assets/$ASSET_ID" --output envcli.tar.gz
            tar -xf envcli.tar.gz
      - run:
          name: "Deploy dev environment image"
          command: |
            IMAGE_TAG="k8s-$CIRCLE_SHA1"
            IMAGE_NAME="$IMAGE_REPO:$IMAGE_TAG"
            ENV_NAME="${CIRCLE_BRANCH%%_*}"
            aws eks --region us-east-1 update-kubeconfig --name development
            NON_INTERACTIVE=true ./envcli edit component creatorapp creatorapp -n $ENV_NAME -i $IMAGE_NAME
      - run:
          name: "Notify Slack (if applicable)"
          command: |
            set +e
            aws s3 cp s3://com.voiceflow.ci.states/github-actions/dev-env/creator-app-notify-$CIRCLE_SHA1.json state.json
            CHANNEL=$(cat state.json | jq -r '.channel')
            set -e
            if [[ $CHANNEL != "" ]]; then
              echo "Notifying slack..."
              MESSAGE=$(cat state.json | jq -r '.message')
              curl -O https://raw.githubusercontent.com/rockymadden/slack-cli/master/src/slack
              chmod +x ./slack
              ./slack chat send "$MESSAGE" "#${CHANNEL}"
              aws s3 rm s3://com.voiceflow.ci.states/github-actions/dev-env/creator-app-notify-$CIRCLE_SHA1.json 
            fi

workflows:
  dev-environment:
    jobs:
      - build-app-dev-environment:
          context: dev-test
          filters:
            branches:
              only:
                - /env-.*/
      - deploy-app-dev-environment:
          context: dev-test
          requires:
            - build-app-dev-environment
          filters:
            branches:
              only:
                - /env-.*/

      - build-storybook:
          context: dev-test
          filters:
            branches:
              only:
                - /env-.*/
      - build-deploy-storybook-dev-environment:
          context: dev-test
          requires:
            - build-storybook
          filters:
            branches:
              only:
                - /env-.*/

  admin:
    jobs:
      - build-admin:
          context: dev-test
          filters:
            branches:
              only:
                - admin
                - admin-prod
      - build-deploy-admin-image:
          context: dev-test
          requires:
            - build-admin
          filters:
            branches:
              only:
                - admin
                - admin-prod

  storybook:
    jobs:
      - build-storybook:
          context: dev-test
          filters:
            branches:
              ignore:
                - /env-.*/
      - build-deploy-storybook-image:
          context: dev-test
          requires:
            - build-storybook
          filters:
            branches:
              only:
                - master
                - staging

  test-and-release-app:
    jobs:
      - test-integration:
          context: dev-test
          filters:
            branches:
              ignore:
                - /env-.*/
                - staging
      - test:
          context: dev-test
          filters:
            branches:
              ignore:
                - /env-.*/
                - staging
      - test-e2e:
          filters:
            branches:
              ignore:
                - /env-.*/
                - staging
      - build-app:
          context: dev-test
          filters:
            branches:
              ignore:
                - /env-.*/
                - staging
      - vfcommon/release:
          context: dev-test
          requires:
            - test
            - test-integration
            - test-e2e
            - build-app
          filters:
            branches:
              only: master

  deploy-app:
    jobs:
      - build-app:
          <<: *prod_deploy_filters
          context: dev-test
      - build-deploy-app-image:
          <<: *prod_deploy_filters
          tagged: true
          google: true
          context: dev-test
          requires:
            - build-app

  app-staging:
    jobs:
      - build-app:
          context: dev-test
          filters:
            branches:
              only:
                - staging
      - build-deploy-app-image:
          context: dev-test
          requires:
            - build-app
          filters:
            branches:
              only:
                - staging
