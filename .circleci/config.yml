version: 2 # use CircleCI 2.0
jobs:
  release:
    docker:
      - image: node:11
    steps:
      - checkout
      - run: git tag --merged production
      - run: npm i -g semantic-release@15
      - run: semantic-release
  test: # runs not using Workflows must have a `build` job as entry point
    working_directory: ~/app # directory where steps will run
    docker: # run the steps with Docker
      - image: circleci/node:10 # ...with this image as the primary container; this is where all `steps` will run
      - image: circleci/postgres:10 # and this image as the secondary service container
#        environment:
#          POSTGRES_USER: voiceflow
#          POSTGRES_DB: voiceflow_test
      - image: circleci/dynamodb:13-oracle
      - image: elasticsearch:7.0.0
        environment:
          discovery.type: 'single-node'
    steps: # a collection of executable commands
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command:  echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: sudo apt install -y postgresql-client || true
      - run: which psql
      - run:
          name: update npm version
          command: 'sudo npm install -g npm@latest'
      - restore_cache: # special step to restore the dependency cache
          key: react-cache-{{ checksum "app/package.json" }}
      - run:
          name: npm install react packages
          command: cd app && npm install
      - save_cache: # special step to save the dependency cache
          key: react-cache-{{ checksum "app/package.json" }}
          paths:
            - ./node_modules
      - run:
          name: (React Tests)
          command: cd app && CIRCLECI=TRUE npm run test
      - restore_cache: # special step to restore the dependency cache
          # Read about caching dependencies: https://circleci.com/docs/2.0/caching/
          key: node-module-cache-{{ checksum "package.json" }}
      - run:
          name: npm install packages
          command: npm install
      - save_cache: # special step to save the dependency cache
          key: node-module-cache-{{ checksum "package.json" }}
          paths:
            - ./node_modules
      - run:
          name: AWS Config
          command: ./scripts/ecr_credentials.sh
      - run:
          name: Wait for Postgres & Dynamo Docker Images
          command: dockerize -wait tcp://localhost:5432 -timeout 1m && dockerize -wait tcp://localhost:8000 -timeout 1m
      - run:
          name: (Tests)
          command: CIRCLECI=TRUE npm run test
      - run:
          name: Coverage
          command: npm run send-coverage
      - run:
          name: Lint
          command: npm run lint
  deploy-master:
    machine: true
    steps:
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command:  echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: # Need this for --squash to work
          name: set docker daemon to experimental
          command: |
            sudo sh -c 'echo '\''DOCKER_OPTS="--experimental=true"'\'' >> /etc/default/docker'
            sudo service docker restart
      - run:
          name: 'Update Dockerfile Staging'
          command: "sed -i 's/RUN npm run build/RUN REACT_APP_BUILD_ENV=staging npm run build/g' Dockerfile"
      - run:
          name: 'Update Dockerrunfile'
          command: 'sed -i".json" "s/VERSION/$CIRCLE_BUILD_NUM/g" Dockerrun.aws.json'
      - run: # Squash is needed to remove the NPM_TOKEN from the docker image commits
          name: 'Build docker image'
          command: docker build --build-arg NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} --squash -t voiceflow/creator:$CIRCLE_BUILD_NUM .
      - run:
          name: 'Push docker image'
          command: |
            docker login -u $DOCKER_USER -p $DOCKER_PASS
            docker push voiceflow/creator:$CIRCLE_BUILD_NUM
      - run:
          name: 'Update PIP && Install AWS CLI'
          command: |
            rm Dockerfile
            git config user.email "build@voiceflow.com"
            git config user.name "build"
            git add -A
            git commit -m "$CIRCLE_BUILD_NUM BUILD"
            pip install awsebcli
            eb init --region us-east-1 --platform docker voiceflow-creator
            eb use VoiceflowCreator-master
      - run:
          name: Push to Elastic Beanstalk
          command: eb deploy VoiceflowCreator-master -l $CIRCLE_BUILD_NUM --nohang
  deploy-staging:
    machine: true
    steps:
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command:  echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: # Need this for --squash to work
          name: set docker daemon to experimental
          command: |
            sudo sh -c 'echo '\''DOCKER_OPTS="--experimental=true"'\'' >> /etc/default/docker'
            sudo service docker restart
      - run:
          name: 'Update Dockerfile Staging'
          command: "sed -i 's/RUN npm run build/RUN REACT_APP_BUILD_ENV=staging npm run build/g' Dockerfile"
      - run:
          name: 'Update Dockerrunfile'
          command: 'sed -i".json" "s/VERSION/$CIRCLE_BUILD_NUM/g" Dockerrun.aws.json'
      - run: # Squash is needed to remove the NPM_TOKEN from the docker image commits
          name: 'Build docker image'
          command: docker build --build-arg NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} --squash -t voiceflow/creator:$CIRCLE_BUILD_NUM .
      - run:
          name: 'Push docker image'
          command: |
            docker login -u $DOCKER_USER -p $DOCKER_PASS
            docker push voiceflow/creator:$CIRCLE_BUILD_NUM
      - run:
          name: 'Update PIP && Install AWS CLI'
          command: |
            rm Dockerfile
            git config user.email "build@voiceflow.com"
            git config user.name "build"
            git add -A
            git commit -m "BUILD $CIRCLE_BUILD_NUM BUILD"
            pip install awsebcli
            eb init --region us-east-1 --platform docker voiceflow-creator
            eb use VoiceflowCreator-staging
      - run:
          name: Push to Elastic Beanstalk
          command: eb deploy VoiceflowCreator-staging -l $CIRCLE_BUILD_NUM --nohang
  deploy-production:
    machine: true
    steps:
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command:  echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: # Need this for --squash to work
          name: set docker daemon to experimental
          command: |
            sudo sh -c 'echo '\''DOCKER_OPTS="--experimental=true"'\'' >> /etc/default/docker'
            sudo service docker restart
      - run:
          name: 'Update Dockerfile Production'
          command: "sed -i 's/RUN npm run build/RUN REACT_APP_BUILD_ENV=production npm run build/g' Dockerfile"
      - run:
          name: 'Update Dockerrunfile'
          command: 'sed -i".json" "s/VERSION/$CIRCLE_BUILD_NUM/g" Dockerrun.aws.json'
      - run: # Squash is needed to remove the NPM_TOKEN from the docker image commits
          name: 'Build docker image'
          command: docker build --build-arg NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} --squash -t voiceflow/creator:$CIRCLE_BUILD_NUM .
      - run:
          name: 'Push docker image'
          command: |
            docker login -u $DOCKER_USER -p $DOCKER_PASS
            docker push voiceflow/creator:$CIRCLE_BUILD_NUM
      - run:
          name: 'Update PIP && Install AWS CLI'
          command: |
            rm Dockerfile
            git config user.email "build@voiceflow.com"
            git config user.name "build"
            git add -A
            git commit -m "BUILD $CIRCLE_BUILD_NUM BUILD"
            pip install awsebcli
            eb init --region us-east-1 --platform docker voiceflow-creator
            eb use VoiceflowCreator-env
      - run:
          name: Push to Elastic Beanstalk
          command: eb deploy VoiceflowCreator-env -l $CIRCLE_BUILD_NUM --nohang
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - deploy-master:
          requires:
            - test
          filters:
            branches:
              only: master
      - deploy-staging:
          requires:
            - test
          filters:
            branches:
              only: staging
      - deploy-production:
          requires:
            - test
          filters:
            branches:
              only: production
      - release:
          requires:
            - test
            - deploy-production
          filters:
            branches:
              only: production
