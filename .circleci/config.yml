version: 2.1

executors:
  node_11:
    working_directory: ~/voiceflow # directory where steps will run
    docker: # run the steps with Docker
      - image: circleci/node:11 # ...with this image as the primary container; this is where all `steps` will run
    environment:
      NODE_OPTIONS: --max-old-space-size=2048
  image_builder:
    working_directory: /tmp/vf-build
    docker: 
      - image: voiceflow/ci-image:v3

commands:
  run_tests:
    description: Run tests against codebase
    parameters:
      tests:
        type: steps
        default: []
      saveCache:
        type: boolean
        default: false
    steps:
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - restore_cache: # special step to restore the dependency cache
          key: react-cache-{{ checksum "package.json" }}
      - run:
          name: yarn install packages
          command: yarn
      - when:
          condition: << parameters.saveCache >>
          steps:
            - save_cache: # special step to save the dependency cache
                key: react-cache-{{ checksum "package.json" }}
                paths:
                  - ./node_modules
      - steps: << parameters.tests >>

jobs:
  release:
    docker:
      - image: circleci/node:11
    steps:
      - checkout
      - run: git tag --merged production
      - run: npx semantic-release@15
  test: # runs not using Workflows must have a `build` job as entry point
    executor: node_11
    steps: # a collection of executable commands
      - run_tests:
          saveCache: true
          tests:
            - run:
                name: (React Tests)
                command: npm run test -- --detectOpenHandles --runInBand
            - run:
                name: (Code Style)
                command: npm run lint:quiet
            - run:
                name: (Dependency Tests)
                command: npm run test:dependencies
            - run:
                name: (Build App)
                command: npm run build
            - run:
                name: (Build Storybook)
                command: npm run storybook:build           
  build-push-image:
    executor: image_builder
    steps:
      - checkout # special step to check out source code to working directory
      - setup_remote_docker
      - run:
          name: 'Build docker image'
          command: |
            mkdir -p /tmp/vf-build/vars
            echo -e "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            # Fix semantic versioning and api host
            if [ "$CIRCLE_BRANCH" == "production" ]; then
              npm config set unsafe-perm true # needed for npx to work
              set +e # Do not terminate on first error (for semantic-release)
              npx semantic-release@15 --prepare --dry-run | tee sem_release.output  # print semver to screen
              SEM_VER=$(cat sem_release.output | grep 'Published release ' | awk '{print $NF}')  # Get release semver
              set -e
              if [ -z "$SEM_VER" ]; then
                echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
                SEM_VER=$(npm view @voiceflow/creator-app version)
              fi
              VF_APP_API_HOST=api.voiceflow.com
              VF_APP_BUILD_ENV=production
            else
              SEM_VER=$CIRCLE_BRANCH-$CIRCLE_SHA1
              VF_APP_BUILD_ENV=staging
              VF_APP_API_HOST=api.$CIRCLE_BRANCH.voiceflow.com
            fi
            echo -e "Building with SEM_VER=$SEM_VER"
            echo -e "API host is $VF_APP_API_HOST"
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker build \
              --build-arg NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} \
              --build-arg BUILD_NUM=$CIRCLE_BUILD_NUM \
              --build-arg BUILD_URL=$CIRCLE_BUILD_URL	\
              --build-arg GIT_SHA=$CIRCLE_SHA1 \
              --build-arg SEM_VER=$SEM_VER \
              --build-arg VF_APP_BUILD_ENV=$VF_APP_BUILD_ENV \
              --build-arg VF_APP_API_HOST=$VF_APP_API_HOST \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_BUILD_NUM . 
            echo $CIRCLE_BUILD_NUM > /tmp/vf-build/vars/build_num
      - run:
          name: 'Push docker images'
          command: |
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_BUILD_NUM
            docker tag 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_BUILD_NUM 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:latest-$CIRCLE_BRANCH
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:latest-$CIRCLE_BRANCH
      - persist_to_workspace:
          root: vars
          paths:
            - build_num
  deploy-image:
    executor: image_builder
    steps:
      - attach_workspace:
          at: /tmp/vf-build/vars
      - run:
          name: Update image
          command: |
            if [ "$CIRCLE_BRANCH" == "master" ] || [ "$CIRCLE_BRANCH" == "staging" ]; then
              aws eks --region us-east-1 update-kubeconfig --name development
            fi
            if [ "$CIRCLE_BRANCH" == "production" ]; then
              aws eks --region us-east-1 update-kubeconfig --name production
            fi
            BUILD_NUM=$(cat /tmp/vf-build/vars/build_num)
            kubectl set image --namespace voiceflow-v1 deployment/creator-app-$CIRCLE_BRANCH app=168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$BUILD_NUM
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - build-push-image:
          filters:
            branches:
              only:
                - master
                - staging
                - production
      - deploy-image:
          requires:
            - test
            - build-push-image
          filters:
            branches:
              only:
                - master
                - staging
                - production
      - release:
          requires:
            - test
            - deploy-image
          filters:
            branches:
              only: production
