version: 2.1

orbs:
  codecov: codecov/codecov@1.0.2

executors:
  node-executor:
    working_directory: ~/voiceflow # directory where steps will run
    docker: # run the steps with Docker
      - image: circleci/node:12 # ...with this image as the primary container; this is where all `steps` will run
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
    resource_class: medium+
  image_builder:
    working_directory: /tmp/vf-build
    docker:
      - image: voiceflow/ci-image:v3

commands:
  install_dependencies:
    description: Restore/update node_modules in cache
    steps:
      - restore_cache: # special step to restore the dependency cache
          key: creator-app-{{ checksum "yarn.lock" }}
      - run:
          name: Install packages
          command: |
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
            yarn install --frozen-lockfile
      - save_cache: # Update dependency cache
          key: creator-app-{{ checksum "yarn.lock" }}
          paths:
            - ./node_modules

jobs:
  release:
    docker:
      - image: circleci/node:12
    steps:
      - checkout
      - run: git tag --merged production
      - run: npx semantic-release@15
  build-app:
    executor: node-executor
    steps:
      - checkout
      - install_dependencies
      - run:
          name: Build app
          command: |
            if [ "$CIRCLE_BRANCH" == "production" ]; then
              export VF_APP_API_HOST=api.voiceflow.com
              export VF_APP_BUILD_ENV=production
              export VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.maintenance/maintenance.json
            else
              export VF_APP_BUILD_ENV=staging
              export VF_APP_API_HOST=api-$CIRCLE_BRANCH.development.voiceflow.com
              export VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.dev.maintenance/maintenance.json
            fi
            yarn build
      - persist_to_workspace:
          root: ~/voiceflow
          paths:
            - build
            - app.dockerfile
            - config
  build-storybook:
    executor: node-executor
    steps:
      - checkout
      - install_dependencies
      - run:
          name: (Build App)
          command: yarn storybook:build
      - persist_to_workspace:
          root: ~/voiceflow
          paths:
            - storybook_build
            - storybook.dockerfile
  build-admin:
    executor: node-executor
    steps:
      - checkout
      - install_dependencies
      - run:
          name: Build admin static artifacts
          command: |
            if [ "$CIRCLE_BRANCH" == "admin" ]; then
              export VF_APP_API_HOST=api-master.development.voiceflow.com
              export VF_APP_BUILD_ENV=staging
            elif [ "$CIRCLE_BRANCH" == "admin-prod" ]; then
              export VF_APP_API_HOST=api.voiceflow.com
              export VF_APP_BUILD_ENV=production
            fi
            yarn build:admin
      - persist_to_workspace:
          root: ~/voiceflow
          paths:
            - admin_build
            - admin.dockerfile
            - config
  test-integration: # Run integration tests in parallel
    executor: node-executor
    steps: # a collection of executable commands
      - checkout
      - install_dependencies
      - run:
          name: (Integration Tests)
          command: yarn test:integration --coverage --detectOpenHandles
      - codecov/upload:
          file: jest_coverage/lcov.info
          flags: integration
  test: # Main unit, style, and dependency tests
    executor: node-executor
    steps: # a collection of executable commands
      - checkout
      - install_dependencies
      - run:
          name: (Unit Tests)
          command: yarn test:unit
      - codecov/upload:
          file: nyc_coverage/lcov.info
          flags: unit
      - run:
          name: (Code Style)
          command: yarn lint:quiet
      - run:
          name: (Dependency Tests)
          command: yarn test:dependencies # Run dependency test here
  build-deploy-app-image:
    executor: image_builder
    steps:
      - attach_workspace:
          at: /tmp/vf-build
      - setup_remote_docker
      - run:
          name: "Build docker image"
          command: |
            docker build \
              -f app.dockerfile \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_SHA1 .
      - run:
          name: "Push docker images"
          command: |
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_SHA1 
            docker tag 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_SHA1 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:latest-$CIRCLE_BRANCH
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:latest-$CIRCLE_BRANCH
      - run:
          name: Deploy image
          command: |
            if [ "$CIRCLE_BRANCH" == "master" ] || [ "$CIRCLE_BRANCH" == "staging" ]; then
              aws eks --region us-east-1 update-kubeconfig --name development
            fi
            if [ "$CIRCLE_BRANCH" == "production" ]; then
              aws eks --region us-east-1 update-kubeconfig --name production
            fi
            kubectl set image --namespace voiceflow-v1 statefulset/creator-app-$CIRCLE_BRANCH app=168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_SHA1
  build-deploy-storybook-image:
    executor: image_builder
    steps:
      - attach_workspace:
          at: /tmp/vf-build
      - setup_remote_docker
      - run:
          name: "Build storybook docker image"
          command: |
            docker build \
              -f storybook.dockerfile \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:k8s-$CIRCLE_SHA1 .
      - run:
          name: "Push storybook docker images"
          command: |
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:k8s-$CIRCLE_SHA1
            docker tag 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:k8s-$CIRCLE_SHA1 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:latest-$CIRCLE_BRANCH
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:latest-$CIRCLE_BRANCH
      - run:
          name: Update image
          command: |
            if [ "$CIRCLE_BRANCH" == "master" ] || [ "$CIRCLE_BRANCH" == "staging" ]; then
              aws eks --region us-east-1 update-kubeconfig --name development
            fi
            if [ "$CIRCLE_BRANCH" == "production" ]; then
              aws eks --region us-east-1 update-kubeconfig --name production
            fi
            kubectl set image --namespace voiceflow-v1 deployment/storybook-$CIRCLE_BRANCH storybook=168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:k8s-$CIRCLE_SHA1
  build-deploy-admin-image:
    executor: image_builder
    steps:
      - attach_workspace:
          at: /tmp/vf-build
      - setup_remote_docker
      - run:
          name: "Build admin docker image"
          command: |
            if [ "$CIRCLE_BRANCH" == "admin" ]; then
              export DEPLOY_SUFFIX=development
            elif [ "$CIRCLE_BRANCH" == "admin-prod" ]; then
              export DEPLOY_SUFFIX=production
            fi
            echo $DEPLOY_SUFFIX > /tmp/deploy_suffix
            docker build \
              -f admin.dockerfile \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:k8s-$DEPLOY_SUFFIX-$CIRCLE_SHA1 .
      - run:
          name: "Push admin docker images"
          command: |
            DEPLOY_SUFFIX=$(cat /tmp/deploy_suffix)
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:k8s-$DEPLOY_SUFFIX-$CIRCLE_SHA1
            docker tag 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:k8s-$DEPLOY_SUFFIX-$CIRCLE_SHA1 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:latest-$DEPLOY_SUFFIX
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:latest-$DEPLOY_SUFFIX
      - run:
          name: "Deploy admin docker image"
          command: |
            DEPLOY_SUFFIX=$(cat /tmp/deploy_suffix)
            if [ "$CIRCLE_BRANCH" == "admin" ]; then
              aws eks --region us-east-1 update-kubeconfig --name development
            elif [ "$CIRCLE_BRANCH" == "admin-prod" ]; then
              aws eks --region us-east-1 update-kubeconfig --name production
            fi
            kubectl set image --namespace voiceflow-v1 deployment/admin-ui-$DEPLOY_SUFFIX app=168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:k8s-$DEPLOY_SUFFIX-$CIRCLE_SHA1
  build-app-dev-environment:
    executor: node-executor
    steps:
      - checkout
      - install_dependencies
      - run:
          name: Build app
          command: |
            ENV_NAME=${CIRCLE_BRANCH##*-}
            export VF_APP_BUILD_ENV=staging
            export VF_APP_API_HOST=api-$ENV_NAME.development.voiceflow.com
            export VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.dev.maintenance/maintenance.json
            yarn build
      - persist_to_workspace:
          root: ~/voiceflow
          paths:
            - build
            - app.dockerfile
            - config

  deploy-app-dev-environment:
    executor: image_builder
    steps:
      - checkout # special step to check out source code to working directory
      - add_ssh_keys: # To enable write access to repository for removing ephemeral branches
          fingerprints:
            - "93:f8:51:53:5e:bd:75:0e:29:24:4d:6a:3f:ef:e1:4a"
      - attach_workspace:
          at: /tmp/vf-build
      - setup_remote_docker
      - run:
          name: "Build and deploy ephemeral image"
          command: |
            ENV_NAME=${CIRCLE_BRANCH##*-}
            docker build \
              -f app.dockerfile \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:ephemeral-$ENV_NAME-$CIRCLE_SHA1 .
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:ephemeral-$ENV_NAME-$CIRCLE_SHA1
            git push origin --delete $CIRCLE_BRANCH --no-verify
            aws eks --region us-east-1 update-kubeconfig --name development
            kubectl set image --namespace ephemeral-$ENV_NAME statefulset/creator-app-$ENV_NAME app=168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:ephemeral-$ENV_NAME-$CIRCLE_SHA1

workflows:
  dev-environment:
    jobs:
      - build-app-dev-environment:
          filters:
            branches:
              only:
                - /ephemeral.*/
      - deploy-app-dev-environment:
          requires:
            - build-app-dev-environment
          filters:
            branches:
              only:
                - /ephemeral.*/

  admin:
    jobs:
      - build-admin:
          filters:
            branches:
              only:
                - admin
                - admin-prod
      - build-deploy-admin-image:
          requires:
            - build-admin
          filters:
            branches:
              only:
                - admin
                - admin-prod

  storybook:
    jobs:
      - build-storybook:
          filters:
            branches:
              ignore:
                - /ephemeral.*/
                - production
      - build-deploy-storybook-image:
          requires:
            - build-storybook
          filters:
            branches:
              only:
                - master
                - staging

  app:
    jobs:
      - test-integration:
          filters:
            branches:
              ignore:
                - /ephemeral.*/
                - staging
      - test:
          filters:
            branches:
              ignore:
                - /ephemeral.*/
                - staging
      - build-app:
          filters:
            branches:
              ignore:
                - /ephemeral.*/
                - staging
      - build-deploy-app-image:
          requires:
            - test
            - test-integration
            - build-app
          filters:
            branches:
              only:
                - master
                - production
      - release:
          requires:
            - test
            - test-integration
            - build-app
          filters:
            branches:
              only: production

  app-staging:
    jobs:
      - build-app:
          filters:
            branches:
              only:
                - staging
      - build-deploy-app-image:
          requires:
            - build-app
          filters:
            branches:
              only:
                - staging
