version: 2 # use CircleCI 2.0
jobs:
  release:
    docker:
      - image: node:11
    steps:
      - checkout
      - run: git tag --merged production
      - run: npm i -g semantic-release@15
      - run: semantic-release
  test: # runs not using Workflows must have a `build` job as entry point
    working_directory: ~/voiceflow # directory where steps will run
    docker: # run the steps with Docker
      - image: circleci/node:11 # ...with this image as the primary container; this is where all `steps` will run
    steps: # a collection of executable commands
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command:  echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - restore_cache: # special step to restore the dependency cache
          key: react-cache-{{ checksum "package.json" }}
      - run:
          name: yarn install packages
          command: yarn
      - save_cache: # special step to save the dependency cache
          key: react-cache-{{ checksum "package.json" }}
          paths:
            - ./node_modules
      - run:
          name: (React Tests)
          command: CIRCLECI=TRUE npm run test
      - restore_cache: # special step to restore the dependency cache
          # Read about caching dependencies: https://circleci.com/docs/2.0/caching/
          key: node-module-cache-{{ checksum "package.json" }}
  deploy-staging:
    machine: true
    steps:
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command:  echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: # Need this for --squash to work
          name: set docker daemon to experimental
          command: |
            sudo sh -c 'echo '\''DOCKER_OPTS="--experimental=true"'\'' >> /etc/default/docker'
            sudo service docker restart
      - run:
          name: 'Update Elastic Beanstalk Dockerrunfile.aws.json'
          command: 'sed -i".json" "s/VERSION/$CIRCLE_BUILD_NUM/g" Dockerrun.aws.json'
      - run: 
          name: 'Build docker image'
          command: docker build --build-arg build_NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} --build-arg build_APP_API_HOST=api.staging.voiceflow.com --build-arg build_REACT_APP_BUILD_ENV=staging --squash -t voiceflow/creator-app:$CIRCLE_BUILD_NUM .
      - run:
          name: 'Push docker image'
          command: |
            docker login -u $DOCKER_USER -p $DOCKER_PASS
            docker push voiceflow/creator-app:$CIRCLE_BUILD_NUM
      - run:
          name: 'Update PIP && Install AWS EB'
          command: |
            rm Dockerfile
            git config user.email "build@voiceflow.com"
            git config user.name "build"
            git add -u
            git commit -m "$CIRCLE_BUILD_NUM BUILD"
            pip install awsebcli
            eb init --region us-east-1 --platform docker creator-app
            eb use CreatorApp-staging
      - run:
          name: Push to Elastic Beanstalk
          command: eb deploy CreatorApp-staging --staged -l $CIRCLE_BUILD_NUM --nohang
  deploy-master:
    machine: true
    steps:
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command:  echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: # Need this for --squash to work
          name: set docker daemon to experimental
          command: |
            sudo sh -c 'echo '\''DOCKER_OPTS="--experimental=true"'\'' >> /etc/default/docker'
            sudo service docker restart
      - run:
          name: 'Update Elastic Beanstalk Dockerrunfile.aws.json'
          command: 'sed -i".json" "s/VERSION/$CIRCLE_BUILD_NUM/g" Dockerrun.aws.json'
      - run: 
          name: 'Build docker image'
          command: docker build --build-arg build_NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} --build-arg build_APP_API_HOST=api.dev.voiceflow.com --build-arg build_REACT_APP_BUILD_ENV=staging --squash -t voiceflow/creator-app:$CIRCLE_BUILD_NUM .
      - run:
          name: 'Push docker image'
          command: |
            docker login -u $DOCKER_USER -p $DOCKER_PASS
            docker push voiceflow/creator-app:$CIRCLE_BUILD_NUM
      - run:
          name: 'Update PIP && Install AWS EB'
          command: |
            rm Dockerfile
            git config user.email "build@voiceflow.com"
            git config user.name "build"
            git add -u
            git commit -m "$CIRCLE_BUILD_NUM BUILD"
            pip install awsebcli
            eb init --region us-east-1 --platform docker creator-app
            eb use CreatorApp-master
      - run:
          name: Push to Elastic Beanstalk
          command: eb deploy CreatorApp-master --staged -l $CIRCLE_BUILD_NUM --nohang
  deploy-production:
    machine: true
    steps:
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command:  echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: # Need this for --squash to work
          name: set docker daemon to experimental
          command: |
            sudo sh -c 'echo '\''DOCKER_OPTS="--experimental=true"'\'' >> /etc/default/docker'
            sudo service docker restart
      - run:
          name: 'Update Elastic Beanstalk Dockerrunfile.aws.json'
          command: 'sed -i".json" "s/VERSION/$CIRCLE_BUILD_NUM/g" Dockerrun.aws.json'
      - run: 
          name: 'Build docker image'
          command: docker build --build-arg build_NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} --build-arg build_APP_API_HOST=api.voiceflow.com --build-arg build_REACT_APP_BUILD_ENV=production --squash -t voiceflow/creator-app:$CIRCLE_BUILD_NUM .
      - run:
          name: 'Push docker image'
          command: |
            docker login -u $DOCKER_USER -p $DOCKER_PASS
            docker push voiceflow/creator-app:$CIRCLE_BUILD_NUM
      - run:
          name: 'Update PIP && Install AWS EB'
          command: |
            rm Dockerfile
            git config user.email "build@voiceflow.com"
            git config user.name "build"
            git add -u
            git commit -m "$CIRCLE_BUILD_NUM BUILD"
            pip install awsebcli
            eb init --region us-east-1 --platform docker creator-app
            eb use CreatorApp-production
      - run:
          name: Push to Elastic Beanstalk
          command: eb deploy CreatorApp-production --staged -l $CIRCLE_BUILD_NUM --nohang
  deploy-k8s:
    machine: true
    steps:
      - checkout # special step to check out source code to working directory
      - run:
          name: Add token
          command:  echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: # Need this for --squash to work
          name: set docker daemon to experimental
          command: |
            sudo sh -c 'echo '\''DOCKER_OPTS="--experimental=true"'\'' >> /etc/default/docker'
            sudo service docker restart
      - run:
          name: 'Update Elastic Beanstalk Dockerrunfile.aws.json'
          command: 'sed -i".json" "s/VERSION/$CIRCLE_BUILD_NUM/g" Dockerrun.aws.json'
      - run: 
          name: 'Build docker image'
          command: docker build --build-arg build_NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} --build-arg build_APP_API_HOST=api.voiceflow.com --build-arg build_REACT_APP_BUILD_ENV=production --squash -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BUILD_NUM .
      - run:
          name: 'Push docker image'
          command: |
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BUILD_NUM
      - run: 
          name: Install aws-iam-authenticator
          command: |
            curl -o aws-iam-authenticator https://amazon-eks.s3-us-west-2.amazonaws.com/1.13.7/2019-06-11/bin/linux/amd64/aws-iam-authenticator
            chmod +x ./aws-iam-authenticator
            sudo cp ./aws-iam-authenticator /usr/bin
      - run: 
          name: Install kubectl
          command: | 
            curl -LO https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl
            chmod +x ./kubectl
            sudo mv ./kubectl /usr/local/bin/kubectl
      - run: 
          name: Install aws-cli
          command: |
            sudo apt-get install -y python3-pip python3-dev
            sudo pip3 install awscli
      - run: 
          name: Get credentials
          command: | 
            aws eks --region us-east-1 update-kubeconfig --name blue
      - run: 
          name: Update image
          command: |
            kubectl set image --namespace voiceflow-v1 deployment/creator-app app=168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BUILD_NUM
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - deploy-staging:
          requires:
            - test
          filters:
            branches:
              only: staging
      - deploy-master:
          requires:
            - test
          filters:
            branches:
              only: master
      - deploy-production:
          requires:
            - test
          filters:
            branches:
              only: production
      - deploy-k8s:
          requires:
            - test
          filters:
            branches:
              only: k8s
      - release:
          requires:
            - test
            - deploy-production
          filters:
            branches:
              only: production