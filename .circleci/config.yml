version: 2.1

executors:
  node-executor:
    working_directory: ~/voiceflow # directory where steps will run
    docker: # run the steps with Docker
      - image: circleci/node:12 # ...with this image as the primary container; this is where all `steps` will run
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
    resource_class: medium+
  image_builder:
    working_directory: /tmp/vf-build
    docker:
      - image: voiceflow/ci-image:v3

commands:
  run_tests:
    description: Run tests against codebase
    parameters:
      tests:
        type: steps
        default: []
      saveCache:
        type: boolean
        default: false
    steps:
      - checkout # special step to check out source code to working directory
      - restore_cache: # special step to restore the dependency cache
          key: creator-app-{{ checksum "yarn.lock" }}
      - run:
          name: yarn install packages
          command: |
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
            yarn install --frozen-lockfile
      - when:
          condition: << parameters.saveCache >>
          steps:
            - save_cache: # special step to save the dependency cache
                key: creator-app-{{ checksum "yarn.lock" }}
                paths:
                  - ./node_modules
      - steps: << parameters.tests >>

jobs:
  release:
    docker:
      - image: circleci/node:11
    steps:
      - checkout
      - run: git tag --merged production
      - run: npx semantic-release@15
  test-build-app:
    executor: node-executor
    steps:
      - run_tests:
          saveCache: false
          tests:
            - run:
                name: (Build App)
                command: yarn build
  test-build-storybook:
    executor: node-executor
    steps:
      - run_tests:
          saveCache: false
          tests:
            - run:
                name: (Build App)
                command: yarn storybook:build
  test: # runs not using Workflows must have a `build` job as entry point
    executor: node-executor
    steps: # a collection of executable commands
      - run_tests:
          saveCache: true
          tests:
            - run:
                name: (React Tests)
                command: yarn test --detectOpenHandles
            - run:
                name: (Code Style)
                command: yarn lint:quiet
            - run:
                name: (Dependency Tests)
                command: yarn test:dependencies # Run dependency test here
  build-push-image:
    executor: image_builder
    steps:
      - checkout # special step to check out source code to working directory
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: "Build docker image"
          command: |
            mkdir -p /tmp/vf-build/vars
            echo -e "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            # Fix semantic versioning and api host
            if [ "$CIRCLE_BRANCH" == "production" ]; then
              npm config set unsafe-perm true # needed for npx to work
              set +e # Do not terminate on first error (for semantic-release)
              npx semantic-release@15 --prepare --dry-run | tee sem_release.output  # print semver to screen
              SEM_VER=$(cat sem_release.output | grep 'Published release ' | awk '{print $NF}')  # Get release semver
              set -e
              if [ -z "$SEM_VER" ]; then
                echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
                SEM_VER=$(npm view @voiceflow/creator-app version)
              fi
              VF_APP_API_HOST=api.voiceflow.com
              VF_APP_BUILD_ENV=production
              VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.maintenance/maintenance.json
            else
              SEM_VER=$CIRCLE_BRANCH-$CIRCLE_SHA1
              VF_APP_BUILD_ENV=staging
              VF_APP_API_HOST=api-$CIRCLE_BRANCH.development.voiceflow.com
              VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.dev.maintenance/maintenance.json
            fi
            echo -e "Building with SEM_VER=$SEM_VER"
            echo -e "API host is $VF_APP_API_HOST"
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker build \
              --build-arg NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} \
              --build-arg BUILD_NUM=$CIRCLE_BUILD_NUM \
              --build-arg BUILD_URL=$CIRCLE_BUILD_URL	\
              --build-arg GIT_SHA=$CIRCLE_SHA1 \
              --build-arg SEM_VER=$SEM_VER \
              --build-arg VF_APP_VERSION=$SEM_VER \
              --build-arg VF_APP_BUILD_ENV=$VF_APP_BUILD_ENV \
              --build-arg VF_APP_API_HOST=$VF_APP_API_HOST \
              --build-arg VF_APP_MAINTENANCE_STATUS_SOURCE=$VF_APP_MAINTENANCE_STATUS_SOURCE \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_BUILD_NUM .
            echo $CIRCLE_BUILD_NUM > /tmp/vf-build/vars/app_build_num
      - run:
          name: "Push docker images"
          command: |
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_BUILD_NUM
            docker tag 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$CIRCLE_BUILD_NUM 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:latest-$CIRCLE_BRANCH
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:latest-$CIRCLE_BRANCH
      - persist_to_workspace:
          root: vars
          paths:
            - app_build_num
  deploy-image:
    executor: image_builder
    steps:
      - attach_workspace:
          at: /tmp/vf-build/vars
      - run:
          name: Update image
          command: |
            if [ "$CIRCLE_BRANCH" == "master" ] || [ "$CIRCLE_BRANCH" == "staging" ]; then
              aws eks --region us-east-1 update-kubeconfig --name development
            fi
            if [ "$CIRCLE_BRANCH" == "production" ]; then
              aws eks --region us-east-1 update-kubeconfig --name production
            fi
            BUILD_NUM=$(cat /tmp/vf-build/vars/app_build_num)
            kubectl set image --namespace voiceflow-v1 deployment/creator-app-$CIRCLE_BRANCH app=168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:k8s-$CIRCLE_BRANCH-$BUILD_NUM
  build-push-storybook:
    executor: image_builder
    steps:
      - checkout # special step to check out source code to working directory
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: "Build storybook docker image"
          command: |
            mkdir -p /tmp/vf-build/vars
            $(aws ecr get-login --no-include-email --region us-east-1)
            mv storybook.dockerignore .dockerignore
            docker build \
              -f storybook.dockerfile \
              --build-arg NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:k8s-$CIRCLE_BRANCH-$CIRCLE_BUILD_NUM .
            echo $CIRCLE_BUILD_NUM > /tmp/vf-build/vars/storybook_build_num
      - run:
          name: "Push storybook docker images"
          command: |
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:k8s-$CIRCLE_BRANCH-$CIRCLE_BUILD_NUM
            docker tag 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:k8s-$CIRCLE_BRANCH-$CIRCLE_BUILD_NUM 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:latest-$CIRCLE_BRANCH
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:latest-$CIRCLE_BRANCH
      - persist_to_workspace:
          root: vars
          paths:
            - storybook_build_num
  deploy-storybook:
    executor: image_builder
    steps:
      - attach_workspace:
          at: /tmp/vf-build/vars
      - run:
          name: Update image
          command: |
            if [ "$CIRCLE_BRANCH" == "master" ] || [ "$CIRCLE_BRANCH" == "staging" ]; then
              aws eks --region us-east-1 update-kubeconfig --name development
            fi
            if [ "$CIRCLE_BRANCH" == "production" ]; then
              aws eks --region us-east-1 update-kubeconfig --name production
            fi
            BUILD_NUM=$(cat /tmp/vf-build/vars/storybook_build_num)
            kubectl set image --namespace voiceflow-v1 deployment/storybook-$CIRCLE_BRANCH storybook=168387678261.dkr.ecr.us-east-1.amazonaws.com/storybook:k8s-$CIRCLE_BRANCH-$BUILD_NUM
  build-deploy-admin:
    executor: image_builder
    steps:
      - checkout # special step to check out source code to working directory
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: "Build and deploy admin panel docker image"
          command: |
            DEPLOY_SUFFIX=development
            if [ "$CIRCLE_BRANCH" == "admin" ]; then
              aws eks --region us-east-1 update-kubeconfig --name development
              VF_APP_API_HOST=api-master.development.voiceflow.com
              VF_APP_BUILD_ENV=staging
            fi
            if [ "$CIRCLE_BRANCH" == "admin-prod" ]; then
              aws eks --region us-east-1 update-kubeconfig --name production
              DEPLOY_SUFFIX=production
              VF_APP_API_HOST=api.voiceflow.com
              VF_APP_BUILD_ENV=production
            fi
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker build \
              -f admin.dockerfile \
              --build-arg NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} \
              --build-arg VF_APP_VERSION="($CIRCLE_BRANCH-$CIRCLE_SHA1)" \
              --build-arg VF_APP_BUILD_ENV=$VF_APP_BUILD_ENV \
              --build-arg VF_APP_API_HOST=$VF_APP_API_HOST \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:k8s-$DEPLOY_SUFFIX-$CIRCLE_BUILD_NUM .
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:k8s-$DEPLOY_SUFFIX-$CIRCLE_BUILD_NUM
            docker tag 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:k8s-$DEPLOY_SUFFIX-$CIRCLE_BUILD_NUM 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:latest-$DEPLOY_SUFFIX
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:latest-$DEPLOY_SUFFIX
            kubectl set image --namespace voiceflow-v1 deployment/admin-ui-$DEPLOY_SUFFIX app=168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:k8s-$DEPLOY_SUFFIX-$CIRCLE_BUILD_NUM
  build-deploy-ephemeral:
    executor: image_builder
    steps:
      - checkout # special step to check out source code to working directory
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: "Build and deploy ephemeral image"
          command: |
            echo -e "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            SEM_VER=$CIRCLE_BRANCH-$CIRCLE_SHA1
            VF_APP_BUILD_ENV=staging
            ENV_NAME=${CIRCLE_BRANCH##*-}
            VF_APP_API_HOST=api-$ENV_NAME.development.voiceflow.com
            $(aws ecr get-login --no-include-email --region us-east-1)
            docker build \
              --build-arg NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} \
              --build-arg BUILD_NUM=$CIRCLE_BUILD_NUM \
              --build-arg BUILD_URL=$CIRCLE_BUILD_URL	\
              --build-arg GIT_SHA=$CIRCLE_SHA1 \
              --build-arg SEM_VER=$SEM_VER \
              --build-arg VF_APP_VERSION="($SEM_VER)" \
              --build-arg VF_APP_BUILD_ENV=$VF_APP_BUILD_ENV \
              --build-arg VF_APP_API_HOST=$VF_APP_API_HOST \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:ephemeral-$ENV_NAME-$CIRCLE_BUILD_NUM .
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:ephemeral-$ENV_NAME-$CIRCLE_BUILD_NUM
            # Admin build
            docker build \
              -f admin.dockerfile \
              --build-arg NPM_TOKEN=//registry.npmjs.org/:_authToken=${NPM_TOKEN} \
              --build-arg VF_APP_VERSION="($SEM_VER)" \
              --build-arg VF_APP_BUILD_ENV=$VF_APP_BUILD_ENV \
              --build-arg VF_APP_API_HOST=$VF_APP_API_HOST \
              -t 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:ephemeral-$ENV_NAME-$CIRCLE_BUILD_NUM .
            docker push 168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:ephemeral-$ENV_NAME-$CIRCLE_BUILD_NUM
            aws eks --region us-east-1 update-kubeconfig --name development
            kubectl set image --namespace ephemeral-$ENV_NAME deployment/creator-app-$ENV_NAME app=168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app:ephemeral-$ENV_NAME-$CIRCLE_BUILD_NUM
            kubectl set image --namespace ephemeral-$ENV_NAME deployment/admin-ui-$ENV_NAME app=168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin:ephemeral-$ENV_NAME-$CIRCLE_BUILD_NUM
workflows:
  build-deploy:
    jobs:
      - test-build-app:
          filters:
            branches:
              ignore:
                - /ephemeral.*/
                - production
      - test-build-storybook:
          filters:
            branches:
              ignore:
                - /ephemeral.*/
                - production
      - test:
          filters:
            branches:
              ignore:
                - /ephemeral.*/
      - build-deploy-ephemeral:
          filters:
            branches:
              only:
                - /ephemeral.*/
      - build-push-image:
          filters:
            branches:
              only:
                - master
                - staging
                - production
      - deploy-image:
          requires:
            - test
            - build-push-image
          filters:
            branches:
              only:
                - master
                - staging
                - production
      - build-push-storybook:
          filters:
            branches:
              only:
                - master
                - staging
      - deploy-storybook:
          requires:
            - test-build-storybook
            - build-push-storybook
          filters:
            branches:
              only:
                - master
                - staging
      - build-deploy-admin:
          requires:
            - test
          filters:
            branches:
              only:
                - admin
                - admin-prod
      - release:
          requires:
            - test
            - deploy-image
          filters:
            branches:
              only: production
