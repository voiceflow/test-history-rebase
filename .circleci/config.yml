workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - build:
          requires:
            - test
          filters:
            branches:
              ignore:
                - production
                - master
                - staging
      - deploy-production:
          requires:
            - test
          filters:
            branches:
              only: production
      - deploy-creator-master:
          requires:
            - test
          filters:
            branches:
              only: master
      - deploy-storybook-master:
          requires:
            - test
          filters:
            branches:
              only: master
      - deploy-creator-staging:
          requires:
            - test
          filters:
            branches:
              only: staging
      - deploy-storybook-staging:
          requires:
            - test
          filters:
            branches:
              only: staging
      - deploy-k8s-production:
          requires:
            - test
          filters:
            branches:
              only: production
      - release:
          requires:
            - test
            - deploy-production
          filters:
            branches:
              only: production
