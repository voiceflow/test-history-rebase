version: 2.1

parameters:
  container-image-url-creator-app:
    type: string
    default: '168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-app'
  container-image-url-admin-ui:
    type: string
    default: '168387678261.dkr.ecr.us-east-1.amazonaws.com/creator-admin'
  container-image-url-realtime:
    type: string
    default: '168387678261.dkr.ecr.us-east-1.amazonaws.com/realtime'
  k8s-asset-admin-ui:
    type: string
    default: 'deployment/admin-ui'
  k8s-asset-creator-app:
    type: string
    default: 'deployment/creator-app'
  k8s-asset-realtime:
    type: string
    default: 'deployment/realtime'
  k8s-namespace:
    type: string
    default: 'voiceflow-v1' # This is usually voiceflow-v1
  ssh-fingerprint:
    type: string
    default: '93:f8:51:53:5e:bd:75:0e:29:24:4d:6a:3f:ef:e1:4a'
  track-component-creator-app:
    type: string
    default: 'creator-app'
  track-component-admin-ui:
    type: string
    default: 'admin-ui'
  track-component-realtime:
    type: string
    default: 'realtime'
  build-creator-app:
    type: boolean
    default: false
  build-admin-app:
    type: boolean
    default: false
  build-realtime:
    type: boolean
    default: false
  build-realtime-sdk:
    type: boolean
    default: false
  build-ui:
    type: boolean
    default: false
  build-all:
    type: boolean
    default: false
  build-frontend:
    type: boolean
    default: false
  build-backend:
    type: boolean
    default: false

orbs:
  vfcommon: voiceflow/common@0.0.258
  sonarcloud: sonarsource/sonarcloud@1.0.2
  jira: circleci/jira@1.3.1

# Reusable YAML chunks
defaults:
  prod_creator_deploy_filters: &prod_creator_deploy_filters
    filters:
      branches:
        ignore: /.*/
      tags:
        only: /^@voiceflow/creator-app@[0-9]*(\.[0-9]*)*$/

  prod_admin_deploy_filters: &prod_admin_deploy_filters
    filters:
      branches:
        ignore: /.*/
      tags:
        only: /^@voiceflow/admin-app@[0-9]*(\.[0-9]*)*$/

  prod_realtime_deploy_filters: &prod_realtime_deploy_filters
    filters:
      branches:
        ignore: /.*/
      tags:
        only: /^@voiceflow/realtime@[0-9]*(\.[0-9]*)*$/

  ignore_staging_filters: &ignore_staging_filters
    branches:
      ignore:
        - staging

  slack-fail-post-step: &slack-fail-post-step
    post-steps:
      - vfcommon/notify_slack:
          channel: dev_general
          event: fail
          mentions: '@eng_creator'
          template: basic_fail_1
          branch_pattern: master


jobs:
  build-app:
    parameters:
      check_image:
        description: Checks if the Docker image exists
        type: boolean
        default: false
      strict:
        description: Run typechecking and other build-time analyses
        type: boolean
        default: false
      force_execute:
        description: force to update the build, if there is a change or not. This is for tracks
        type: boolean
        default: false
    executor: vfcommon/node-executor
    steps:
      - when:
          condition:
            or:
              - << pipeline.parameters.build-creator-app >>
              - << pipeline.parameters.build-ui >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-frontend >>
              - << pipeline.parameters.build-all >>
          steps:
            - checkout
            - when:
                condition:
                  equal: [false, << parameters.force_execute >>]
                steps:
                  - vfcommon/stop_if_no_changes:
                      package: creator-app
            - when:
                condition: << parameters.check_image >>
                steps:
                  - vfcommon/install_aws_cli
                  - vfcommon/check_image_exists:
                      image_repo: << pipeline.parameters.container-image-url-creator-app >>
            - vfcommon/install_node_modules:
                avoid_post_install_scripts: false
            - vfcommon/install_cpio
            - run:
                name: Build dependencies
                command: |
                  yarn build --scope @voiceflow/realtime-sdk --scope @voiceflow/ui
                working_directory: ~/voiceflow
            - run:
                name: Build app, if docker container does not exist
                command: |
                  if [[ -z "$CIRCLE_BRANCH" && ! -z "$CIRCLE_TAG" ]]; then
                    echo "Building production image!"
                    export VF_APP_API_HOST=api.voiceflow.com
                    export VF_APP_BUILD_ENV=production
                    export VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.maintenance/maintenance.json
                  else
                    echo "Building development image!"
                    export VF_APP_BUILD_ENV=staging
                    export VF_APP_API_HOST=api-$CIRCLE_BRANCH.development.voiceflow.com
                    export VF_APP_MAINTENANCE_STATUS_SOURCE=https://s3.amazonaws.com/com.voiceflow.dev.maintenance/maintenance.json
                  fi
                  yarn build
                working_directory: ~/voiceflow/packages/creator-app
            - persist_to_workspace:
                root: ~/voiceflow/packages/creator-app
                paths:
                  - build
                  - Dockerfile
                  - config

  build-realtime:
    parameters:
      check_image:
        description: Checks if the Docker image exists
        type: boolean
        default: false
      force_execute:
        description: force to update the build, if there is a change or not. This is for tracks
        type: boolean
        default: false
    executor: vfcommon/node-executor
    steps:
      - when:
          condition:
            or:
              - << pipeline.parameters.build-realtime >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-backend >>
              - << pipeline.parameters.build-all >>
          steps:
            - checkout
            - when:
                condition:
                  equal: [false, << parameters.force_execute >>]
                steps:
                  - vfcommon/stop_if_no_changes:
                      package: realtime
            - when:
                condition: << parameters.check_image >>
                steps:
                  - vfcommon/install_aws_cli
                  - vfcommon/check_image_exists:
                      image_repo: << pipeline.parameters.container-image-url-creator-app >>
            - vfcommon/install_node_modules:
                avoid_post_install_scripts: false
            - run:
                name: Build realtime
                command: |
                  yarn build --scope @voiceflow/realtime*
                  cp yarn.lock packages/realtime
                working_directory: ~/voiceflow
            - persist_to_workspace:
                root: ~/voiceflow
                paths:
                  - packages/realtime-sdk/build
                  - packages/realtime/build
                  - packages/realtime/Dockerfile
                  - packages/realtime/yarn.lock

  build-admin:
    parameters:
      strict:
        description: Run typechecking and other build-time analyses
        type: boolean
        default: false
      force_execute:
        description: force to update the build, if there is a change or not. This is for tracks
        type: boolean
        default: false
    executor: vfcommon/node-executor
    steps:
      - when:
          condition:
            or:
              - << pipeline.parameters.build-admin-app >>
              - << pipeline.parameters.build-ui >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-frontend >>
              - << pipeline.parameters.build-all >>
          steps:
            - checkout
            - when:
                condition:
                  equal: [false, << parameters.force_execute >>]
                steps:
                  - vfcommon/stop_if_no_changes:
                      package: admin-app
            - vfcommon/install_node_modules:
                avoid_post_install_scripts: false
            - vfcommon/install_cpio

            - run:
                name: Build dependencies
                command: |
                  yarn build --scope @voiceflow/realtime-sdk --scope @voiceflow/ui
                working_directory: ~/voiceflow
            - run:
                name: Build admin static artifacts
                command: |
                  if [[ -z "$CIRCLE_BRANCH" && ! -z "$CIRCLE_TAG" ]]; then
                    echo "Building production image!"
                    export VF_APP_BUILD_ENV=production
                    export VF_APP_API_HOST=api.voiceflow.com
                  else
                    echo "Building development image!"
                    export VF_APP_BUILD_ENV=staging
                    export VF_APP_API_HOST=api-$CIRCLE_BRANCH.development.voiceflow.com
                  fi

                  yarn build <<# parameters.strict >> --validate --strict <</ parameters.strict >>
                working_directory: ~/voiceflow/packages/admin-app
            - persist_to_workspace:
                root: ~/voiceflow/packages/admin-app
                paths:
                  - build
                  - Dockerfile
                  - config

  test: # Main unit, style, and dependency tests
    executor: vfcommon/node-executor
    steps: # a collection of executable commands
      - checkout
      - vfcommon/install_node_modules
      - vfcommon/install_cpio
      - vfcommon/exec_command_when_package_changed_monorepo:
          step_name: Build dependencies
          command: yarn build --scope @voiceflow/realtime-sdk --scope @voiceflow/ui
          package_to_force_execution: 'creator-app'
          force_execution: << pipeline.parameters.build-all >>
          run_on_root: true
      - restore_cache:
          name: Restoring jest Cache
          keys:
            - jest-cache-{{ .Branch }}
            - jest-cache-master
      - restore_cache:
          name: Restoring eslint Cache
          keys:
            - eslint-cache-{{ .Branch }}
            - eslint-cache-master
      - vfcommon/unit_tests_monorepo:
          force_execution: << pipeline.parameters.build-all >>
          run_on_root: << pipeline.parameters.build-all >>
      - vfcommon/integration_tests_monorepo:
          force_execution: << pipeline.parameters.build-all >>
          run_on_root: << pipeline.parameters.build-all >>
      - vfcommon/lint_report_monorepo:
          force_execution: << pipeline.parameters.build-all >>
          run_on_root: << pipeline.parameters.build-all >>
      - vfcommon/lint_dockerfile_monorepo:
          force_execution: << pipeline.parameters.build-all >>
          run_on_root: << pipeline.parameters.build-all >>
      - vfcommon/dependency_tests_monorepo:
          force_execution: << pipeline.parameters.build-all >>
          run_on_root: << pipeline.parameters.build-all >>
      - save_cache:
          name: Saving jest Cache
          key: jest-cache-{{ .Branch }}-{{ .BuildNum }}
          paths:
            - ~/voiceflow/packages/creator-app/.jest_cache
            - ~/voiceflow/packages/ui/.jest_cache
      - save_cache:
          name: Saving eslint Cache
          key: eslint-cache-{{ .Branch }}-{{ .BuildNum }}
          paths:
            - ~/voiceflow/packages/creator-app/.eslintcache
      - when:
          condition:
            or:
              - << pipeline.parameters.build-realtime >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-ui >>
              - << pipeline.parameters.build-admin-app >>
          steps:
            - sonarcloud/scan:
                cache_version: 2

  build-deploy-app-image:
    parameters:
      sentry:
        description: Report deploy to sentry?
        type: boolean
        default: false
    executor: vfcommon/build-executor
    steps:
      - when:
          condition:
            or:
              - << pipeline.parameters.build-creator-app >>
              - << pipeline.parameters.build-ui >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-frontend >>
              - << pipeline.parameters.build-all >>
          steps:
            - checkout
            - vfcommon/stop_if_no_changes:
                package: creator-app
            - attach_workspace:
                at: /tmp/vf-build
            - vfcommon/build_push_image:
                image_repo: << pipeline.parameters.container-image-url-creator-app >>
                dockerfile: Dockerfile
                checkout: false
            - vfcommon/post_image_push_actions:
                namespace: << pipeline.parameters.k8s-namespace >>
                target: << pipeline.parameters.k8s-asset-creator-app >>
                # TODO: rethink this for a monorepo
                # sentry: << parameters.sentry >>
                tagged: true
            - run:
                name: Wait for deployment rollout
                command: |
                  sleep 120

  build-deploy-admin-image:
    executor: vfcommon/build-executor
    steps:
      - when:
          condition:
            or:
              - << pipeline.parameters.build-admin-app >>
              - << pipeline.parameters.build-ui >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-frontend >>
              - << pipeline.parameters.build-all >>
          steps:
            - checkout
            - vfcommon/stop_if_no_changes:
                package: admin-app
            - attach_workspace:
                at: /tmp/vf-build
            - vfcommon/build_push_image:
                image_repo: << pipeline.parameters.container-image-url-admin-ui >>
                dockerfile: Dockerfile
                checkout: false
            - vfcommon/post_image_push_actions:
                namespace: << pipeline.parameters.k8s-namespace >>
                target: << pipeline.parameters.k8s-asset-admin-ui >>
                tagged: true
                success_slack_notify: false

  build-deploy-realtime-image:
    executor: vfcommon/build-executor
    steps:
      - when:
          condition:
            or:
              - << pipeline.parameters.build-realtime >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-backend >>
              - << pipeline.parameters.build-all >>
          steps:
            - checkout
            - vfcommon/stop_if_no_changes:
                package: realtime
            - attach_workspace:
                at: /tmp/vf-build
            - vfcommon/build_push_image:
                image_repo: << pipeline.parameters.container-image-url-realtime >>
                dockerfile: Dockerfile
                build_context: packages/realtime
                checkout: false
            - vfcommon/post_image_push_actions:
                namespace: << pipeline.parameters.k8s-namespace >>
                target: << pipeline.parameters.k8s-asset-realtime >>
                tagged: true
                success_slack_notify: false


  check-track-exists:
    parameters:
      component:
        description: Component to check if the track exists
        type: string
      force_execute:
        description: force to update the build, if there is a change or not. This is for tracks
        type: boolean
        default: false
    executor: vfcommon/build-executor
    steps:
      - run: echo 'checking if track exists...'
      - when:
          condition:
            or:
              - << pipeline.parameters.build-creator-app >>
              - << pipeline.parameters.build-ui >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-frontend >>
              - << pipeline.parameters.build-all >>
          steps:
            - when:
                condition:
                  equal: [false, << parameters.force_execute >>]
                steps:
                  - vfcommon/stop_if_no_changes:
                      package: creator-app
            - vfcommon/check_track_exists:
                component: << parameters.component >>
                stop_if_not_exists: true


  update-track-creator-app:
    parameters:
      force_execute:
        description: force to update the build, if there is a change or not. This is for tracks
        type: boolean
        default: false
    executor: vfcommon/build-executor
    steps:
      - when:
          condition:
            or:
              - << pipeline.parameters.build-creator-app >>
              - << pipeline.parameters.build-ui >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-frontend >>
              - << pipeline.parameters.build-all >>
          steps:
            - checkout
            - when:
                condition:
                  equal: [false, << parameters.force_execute >>]
                steps:
                  - vfcommon/stop_if_no_changes:
                      package: creator-app
            - vfcommon/update_track:
                image_repo: << pipeline.parameters.container-image-url-creator-app >>
                component: << pipeline.parameters.track-component-creator-app >>
                dockerfile: Dockerfile

  update-track-admin-ui:
    parameters:
      force_execute:
        description: force to update the build, if there is a change or not. This is for tracks
        type: boolean
        default: false
    executor: vfcommon/build-executor
    steps:
      - when:
          condition:
            or:
              - << pipeline.parameters.build-admin-app >>
              - << pipeline.parameters.build-ui >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-frontend >>
              - << pipeline.parameters.build-all >>
          steps:
            - checkout
            - when:
                condition:
                  equal: [false, << parameters.force_execute >>]
                steps:
                  - vfcommon/stop_if_no_changes:
                      package: admin-app
            - vfcommon/update_track:
                image_repo: << pipeline.parameters.container-image-url-admin-ui >>
                component: << pipeline.parameters.track-component-admin-ui >>
                dockerfile: Dockerfile

  update-track-realtime:
    parameters:
      force_execute:
        description: force to update the build, if there is a change or not. This is for tracks
        type: boolean
        default: false
      local_registry:
        description: use a local repository proxy to publish a development version of all library packages
        type: boolean
        default: false
    executor: vfcommon/build-executor
    steps:
      - when:
          condition:
            or:
              - << pipeline.parameters.build-realtime >>
              - << pipeline.parameters.build-realtime-sdk >>
              - << pipeline.parameters.build-backend >>
              - << pipeline.parameters.build-all >>
          steps:
            - checkout
            - when:
                condition:
                  equal: [false, << parameters.force_execute >>]
                steps:
                  - vfcommon/stop_if_no_changes:
                      package: realtime

            - vfcommon/update_track:
                image_repo: << pipeline.parameters.container-image-url-realtime >>
                component: << pipeline.parameters.track-component-realtime >>
                dockerfile: Dockerfile
                build_context: packages/realtime
                local_registry: << parameters.local_registry >>
                checkout: false


workflows:
  update-creator-app-track:
    when:
      or:
        - << pipeline.parameters.build-creator-app >>
        - << pipeline.parameters.build-ui >>
        - << pipeline.parameters.build-realtime-sdk >>
        - << pipeline.parameters.build-frontend >>
        - << pipeline.parameters.build-all >>
    jobs:
      - check-track-exists:
          name: check-track-creator-app-exists
          component: << pipeline.parameters.track-component-creator-app >>
          force_execute: true
          context: dev-test
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore: master
      - build-app:
          check_image: true
          context: dev-test
          name: build-app-track
          force_execute: true
          requires:
            - check-track-creator-app-exists
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore: master
      - update-track-creator-app:
          context: dev-test
          force_execute: true
          post-steps:
            - jira/notify:
                environment: ${CIRCLE_BRANCH%%_*}
                environment_type: testing
                job_type: deployment
          requires:
            - check-track-creator-app-exists
            - build-app-track
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore: master

  update-admin-app-track:
    when:
      or:
        - << pipeline.parameters.build-admin-app >>
        - << pipeline.parameters.build-ui >>
        - << pipeline.parameters.build-realtime-sdk >>
        - << pipeline.parameters.build-frontend >>
        - << pipeline.parameters.build-all >>
    jobs:
      - check-track-exists:
          name: check-track-admin-app-exists
          component: << pipeline.parameters.track-component-admin-ui >>
          force_execute: true
          context: dev-test
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore: master
      - build-admin:
          force_execute: true
          context: dev-test
          name: build-admin-track
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore: master
          requires:
            - check-track-admin-app-exists
      - update-track-admin-ui:
          context: dev-test
          force_execute: true
          requires:
            - check-track-admin-app-exists
            - build-admin-track
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore: master

  update-realtime-track:
    when:
      or:
        - << pipeline.parameters.build-realtime >>
        - << pipeline.parameters.build-realtime-sdk >>
        - << pipeline.parameters.build-backend >>
        - << pipeline.parameters.build-all >>
    jobs:
      - check-track-exists:
          name: check-track-realtime-exists
          component: << pipeline.parameters.track-component-realtime >>
          force_execute: true
          context: dev-test
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore: master
      - build-realtime:
          context: dev-test
          force_execute: true
          name: build-realtime-track
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore: master
          requires:
            - check-track-realtime-exists
      - update-track-realtime:
          context: dev-test
          force_execute: true
          local_registry: true
          requires:
            - check-track-realtime-exists
            - build-realtime-track
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore: master

  test-and-release:
    jobs:
      - test:
          <<: *slack-fail-post-step
          context: dev-test
          filters:
            <<: *ignore_staging_filters
      - e2e-approval: # <<< A job that will require manual approval in the CircleCI web application.
          type: approval # <<< This key-value pair will set your workflow to a status of "On Hold"
          filters:
            branches:
              ignore: master
      - vfcommon/dummy_job:
          context: dev-test
      - vfcommon/test_e2e:
          context: dev-test
          github_username: GITHUB_USERNAME
          github_token: GITHUB_TOKEN
          enable: << pipeline.parameters.build-creator-app >>
          force_execute: << pipeline.parameters.build-frontend >>
          requires:
           - e2e-approval
           - vfcommon/dummy_job
          filters:
            <<: *ignore_staging_filters

      - build-app:
          <<: *slack-fail-post-step
          context: dev-test
          name: build-app-test
          force_execute: << pipeline.parameters.build-frontend >>
          strict: true
          post-steps:
            - jira/notify
          filters:
            <<: *ignore_staging_filters

      - build-admin:
          <<: *slack-fail-post-step
          context: dev-test
          name: build-admin-test
          force_execute: << pipeline.parameters.build-frontend >>
          strict: true
          post-steps:
            - jira/notify
          filters:
            <<: *ignore_staging_filters

      - build-realtime:
          <<: *slack-fail-post-step
          context: dev-test
          name: build-realtime-test
          force_execute: << pipeline.parameters.build-backend >>
          post-steps:
            - jira/notify
          filters:
            <<: *ignore_staging_filters

      - vfcommon/release_monorepo:
          <<: *slack-fail-post-step
          sentry_project: creator-app
          avoid_post_install_scripts: false
          ssh_key: << pipeline.parameters.ssh-fingerprint >>
          context: dev-test
          requires:
            - test
            - vfcommon/test_e2e
            - build-app-test
            - build-admin-test
            - build-realtime-test
          filters:
            branches:
              only: master

  # Deploy services
  deploy-app:
    when:
      or:
        - << pipeline.parameters.build-creator-app >>
        - << pipeline.parameters.build-ui >>
        - << pipeline.parameters.build-realtime-sdk >>
        - << pipeline.parameters.build-frontend >>
        - << pipeline.parameters.build-all >>
    jobs:
      - build-app:
          <<: *prod_creator_deploy_filters
          context: dev-test
          name: build-app-release
          force_execute: true
          post-steps:
            - jira/notify
      - update-track-creator-app:
          <<: *prod_creator_deploy_filters
          context: dev-test
          force_execute: true
          name: update-track-creator-app-release
          requires:
            - build-app-release
      - build-deploy-app-image:
          <<: *prod_creator_deploy_filters
          sentry: true
          context: dev-test
          post-steps:
            - jira/notify:
                environment: public
                environment_type: production
                job_type: deployment
          requires:
            - update-track-creator-app-release

  deploy-admin:
    when:
      or:
        - << pipeline.parameters.build-admin-app >>
        - << pipeline.parameters.build-ui >>
        - << pipeline.parameters.build-realtime-sdk >>
        - << pipeline.parameters.build-frontend >>
        - << pipeline.parameters.build-all >>
    jobs:
      - build-admin:
          <<: *prod_admin_deploy_filters
          context: dev-test
          force_execute: true
          name: build-admin-release
      - update-track-admin-ui:
          <<: *prod_admin_deploy_filters
          context: dev-test
          force_execute: true
          name: update-track-admin-ui-release
          requires:
            - build-admin-release
      - build-deploy-admin-image:
          <<: *prod_admin_deploy_filters
          context: dev-test
          requires:
            - update-track-admin-ui-release

  deploy-realtime:
    when:
      or:
        - << pipeline.parameters.build-realtime >>
        - << pipeline.parameters.build-realtime-sdk >>
        - << pipeline.parameters.build-backend >>
        - << pipeline.parameters.build-all >>
    jobs:
      - build-realtime:
          <<: *prod_realtime_deploy_filters
          context: dev-test
          force_execute: true
          name: build-realtime-release
      - update-track-realtime:
          <<: *prod_realtime_deploy_filters
          context: dev-test
          force_execute: true
          name: update-track-realtime-release
          requires:
            - build-realtime-release
      - build-deploy-realtime-image:
          <<: *prod_realtime_deploy_filters
          context: dev-test
          requires:
            - update-track-realtime-release
