language: node_js
node_js:
  - "10"
services:
  - postgresql
  - redis-server
before_script:
  - ./scripts/ecr_credentials.sh
  - ./scripts/before_test.sh
jobs:
  include:
    - stage: "Tests"                # naming the Tests stage
      name: "Unit Tests"            # names the first Tests stage job
      script: npm run unit_tests
      name: "Integration Tests"     # names the second Tests stage job
      script: npm run integration_tests
after_script:
  - ./scripts/after_test.sh
addons:
  hosts:
    - dynamodb-local