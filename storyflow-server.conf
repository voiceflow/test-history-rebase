<VirtualHost *:80>
  ServerName api.getstoryflow.com
  Redirect / https://api.getstoryflow.com/
</VirtualHost>

<VirtualHost _default_:443>
  ServerName api.getstoryflow.com

  SSLEngine on
  SSLCertificateFile /root/ea102a7048aeb505.crt
  SSLCertificateKeyFile /root/privateKey.key
  SSLCertificateChainFile /root/gd_bundle-g2-g1.crt
 
  ProxyPass / http://localhost:8080/
  ProxyPassReverse / http://localhost:8080/
</VirtualHost>
